<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Calendar</title>

    <!-- FullCalendar CSS -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="calendar-page">
     <!-- SIDEBAR -->
   <aside class="sidebars">
        <div class="task-logo">
          <i class="fa-solid fa-square-check"></i>
          <h2>Task Manager</h2>
        </div>

        <nav>
          <ul>
            <li>
                <a href="home.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
              </a>
            </li>

            <li>
              <a href="tasks.html">
                <i class="fa-solid fa-list-check"></i>
                Tasks
              </a>
            </li>

            <li class="task-active">
              <a href="#">
                <i class="fa-solid fa-calendar"></i>
                Calendar
              </a>
            </li>

             <li>
              <a href="analytics.html">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
              </a>
            </li>

            <li>
             <a href="profile.html">
                <i class="fa-solid fa-user"></i>
                Profile
              </a>
            </li>

            <li>
              <a href="settings.html">
                <i class="fa-solid fa-gear"></i>
                Settings
              </a>
            </li>
          </ul>
        </nav>

        <div class="logout">
          <a href="index.html">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
          </a>
        </div>
      </aside>
    
    <main class="contents">

      <div claa="calendar-container">

        <!-- Calendar Section -->
        <section class="calendar-section">
            <h1>Task Calendar</h1>

            <div id="calendar"></div>
        </section>

        <!-- Right Sidebar -->
        <aside class="calendar-sidebar">

            <!-- Selected Date Tasks -->
            <div class="calendar-cards">
                <h2>Tasks for Selected Date</h2>
                <ul id="taskList">
                    <li>Click a date to view tasks</li>
                </ul>
            </div>

            <!-- Upcoming Tasks -->
            <div class="calendar-card">
                <h2>Upcoming Tasks</h2>
                <ul id="upcomingTasks"></ul>
            </div>

        </aside>

      </div>

    </main>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script src="calendar.js"></script>

</body>
<footer>

    <h3>MyTasks</h3>

    <p>
        Organize your life one task at a time.
    </p>

    <div class="socials">

        <i class="fab fa-github"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-twitter"></i>

    </div>

    <p class="copyright">
        © 2026 MyTasks. All Rights Reserved.
    </p>

</footer>
</html>
